lidar:
  port: /dev/tty.SLAB_USBtoUART
  baudrate: 460800
  timeout: 3
  scan_mode: 4          # express scan mode (4 = boost mode for C1)
  min_quality: 10       # filter low-quality points
  min_range_m: 0.05     # ignore points closer than this (sensor blind zone)
  max_range_m: 12.0      # ignore points farther than this

display:
  refresh_hz: 10        # how fast to redraw (lidar runs ~7Hz, match or exceed)
  current_scan_size: 2  # scatter point size for current scan
  map_point_size: 1     # scatter point size for global map

global_map:
  width_m: 15.0         # total map width in meters (centered on sensor)
  height_m: 15.0        # total map height in meters
  resolution_m: 0.03    # meters per grid cell (smaller = more detail, more memory)
  accumulate_weight: 0.15  # how much each new hit adds to occupancy (0-1)
